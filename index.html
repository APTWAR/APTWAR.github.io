<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ساخت | APT WAR</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
    }

    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-animation span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(255, 26, 26, 0.12);
      animation: floatUp 20s infinite;
      border-radius: 50%;
      bottom: -150px;
    }

    .bg-animation span:nth-child(1) { left: 5%; width: 80px; height: 80px; animation-delay: 0s; animation-duration: 22s; }
    .bg-animation span:nth-child(2) { left: 15%; width: 40px; height: 40px; animation-delay: 2s; animation-duration: 18s; }
    .bg-animation span:nth-child(3) { left: 25%; width: 100px; height: 100px; animation-delay: 4s; animation-duration: 25s; }
    .bg-animation span:nth-child(4) { left: 35%; width: 60px; height: 60px; animation-delay: 1s; animation-duration: 20s; }
    .bg-animation span:nth-child(5) { left: 45%; width: 30px; height: 30px; animation-delay: 6s; animation-duration: 16s; }
    .bg-animation span:nth-child(6) { left: 55%; width: 90px; height: 90px; animation-delay: 3s; animation-duration: 24s; }
    .bg-animation span:nth-child(7) { left: 65%; width: 50px; height: 50px; animation-delay: 5s; animation-duration: 19s; }
    .bg-animation span:nth-child(8) { left: 75%; width: 70px; height: 70px; animation-delay: 7s; animation-duration: 21s; }
    .bg-animation span:nth-child(9) { left: 85%; width: 35px; height: 35px; animation-delay: 2.5s; animation-duration: 17s; }
    .bg-animation span:nth-child(10) { left: 92%; width: 110px; height: 110px; animation-delay: 4.5s; animation-duration: 23s; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2.5rem 2rem;
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      max-width: 600px;
      width: 100%;
    }

    .logo {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }

    .logo .apt {
      color: #ffffff;
      letter-spacing: 15px;
      display: block;
      font-size: 0.7em;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
    }

    .logo .war {
      color: #ff1a1a;
      letter-spacing: 20px;
      display: block;
      font-size: 1.1em;
      text-shadow: 0 0 40px rgba(255, 26, 26, 0.6);
    }

    .status-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ff4444;
      margin-bottom: 0.2rem;
      letter-spacing: 3px;
    }

    .sub-status {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 2.2rem;
      letter-spacing: 1px;
    }

    .counter {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .counter-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      min-width: 75px;
      transition: 0.25s;
    }

    .counter-item:hover {
      background: rgba(255, 26, 26, 0.08);
      border-color: #ff1a1a;
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(255, 26, 26, 0.15);
    }

    .counter-number {
      font-size: 2.8rem;
      font-weight: 900;
      color: #ff1a1a;
      display: block;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .counter-label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 0.4rem;
      letter-spacing: 1px;
    }

    .placeholder-message {
      display: inline-block;
      padding: 0.6rem 2rem;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      letter-spacing: 1px;
      margin-top: 0.2rem;
      cursor: default;
    }

    .footer-note {
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.75rem;
      margin-top: 2.2rem;
      letter-spacing: 1.5px;
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 1.8rem 1.2rem;
        margin: 1rem;
        border-radius: 24px;
      }
      .logo {
        font-size: 3.8rem;
      }
      .logo .apt { letter-spacing: 8px; }
      .logo .war { letter-spacing: 12px; }
      .status-title { font-size: 1.8rem; }
      .counter { gap: 0.7rem; }
      .counter-item { padding: 0.8rem 0.8rem; min-width: 60px; border-radius: 12px; }
      .counter-number { font-size: 2.2rem; }
    }

    @media (max-width: 480px) {
      .logo { font-size: 2.8rem; }
      .logo .apt { letter-spacing: 5px; }
      .logo .war { letter-spacing: 8px; }
      .status-title { font-size: 1.5rem; letter-spacing: 1px; }
      .counter-item { min-width: 50px; padding: 0.6rem 0.5rem; }
      .counter-number { font-size: 1.8rem; }
      .counter-label { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="main-container">
    <div class="logo">
      <span class="apt">APT</span>
      <span class="war">WAR</span>
    </div>

    <h2 class="status-title">در حال ساخت</h2>
    <p class="sub-status">زمان سپری‌شده از شروع</p>

    <div class="counter" id="uptimeCounter">
      <div class="counter-item">
        <span class="counter-number" id="days">00</span>
        <span class="counter-label">روز</span>
      </div>
      <div class="counter-item">
        <span class="counter-number" id="hours">00</span>
        <span class="counter-label">ساعت</span>
      </div>
      <div class="counter-item">
        <span class="counter-number" id="minutes">00</span>
        <span class="counter-label">دقیقه</span>
      </div>
      <div class="counter-item">
        <span class="counter-number" id="seconds">00</span>
        <span class="counter-label">ثانیه</span>
      </div>
    </div>

    <div class="placeholder-message">
      ⚡ اخبار · لوح تقدیر · رویدادها
    </div>

    <p class="footer-note">© 2026 APT WAR · ساخت</p>
  </div>

  <script>
    (function() {
      const startTimeKey = 'aptwar_start_timestamp';
      let startTimestamp = localStorage.getItem(startTimeKey);

      if (!startTimestamp) {
        startTimestamp = Date.now();
        localStorage.setItem(startTimeKey, startTimestamp);
      } else {
        startTimestamp = parseInt(startTimestamp, 10);
      }

      function updateUptime() {
        const now = Date.now();
        const elapsed = Math.max(0, now - startTimestamp);

        const days = Math.floor(elapsed / (1000 * 60 * 60 * 24));
        const hours = Math.floor((elapsed % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((elapsed % (1000 * 60)) / 1000);

        document.getElementById('days').textContent = String(days).padStart(2, '0');
        document.getElementById('hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
      }

      updateUptime();
      setInterval(updateUptime, 1000);
    })();
  </script>
</body>
</html>
