<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>APT WAR | به زودی</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
    }

    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-animation span {
      position: absolute;
      display: block;
      width: 20px;
      height: 20px;
      background: rgba(255, 26, 26, 0.15);
      animation: floatUp 20s infinite;
      border-radius: 50%;
      bottom: -150px;
    }

    .bg-animation span:nth-child(1) { left: 5%; width: 80px; height: 80px; animation-delay: 0s; animation-duration: 22s; }
    .bg-animation span:nth-child(2) { left: 15%; width: 40px; height: 40px; animation-delay: 2s; animation-duration: 18s; }
    .bg-animation span:nth-child(3) { left: 25%; width: 100px; height: 100px; animation-delay: 4s; animation-duration: 25s; }
    .bg-animation span:nth-child(4) { left: 35%; width: 60px; height: 60px; animation-delay: 1s; animation-duration: 20s; }
    .bg-animation span:nth-child(5) { left: 45%; width: 30px; height: 30px; animation-delay: 6s; animation-duration: 16s; }
    .bg-animation span:nth-child(6) { left: 55%; width: 90px; height: 90px; animation-delay: 3s; animation-duration: 24s; }
    .bg-animation span:nth-child(7) { left: 65%; width: 50px; height: 50px; animation-delay: 5s; animation-duration: 19s; }
    .bg-animation span:nth-child(8) { left: 75%; width: 70px; height: 70px; animation-delay: 7s; animation-duration: 21s; }
    .bg-animation span:nth-child(9) { left: 85%; width: 35px; height: 35px; animation-delay: 2.5s; animation-duration: 17s; }
    .bg-animation span:nth-child(10) { left: 92%; width: 110px; height: 110px; animation-delay: 4.5s; animation-duration: 23s; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .logo {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .logo .apt {
      color: #ffffff;
      letter-spacing: 15px;
      display: block;
      font-size: 0.7em;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
    }

    .logo .war {
      color: #ff1a1a;
      letter-spacing: 20px;
      display: block;
      font-size: 1.1em;
      text-shadow: 0 0 40px rgba(255, 26, 26, 0.7);
    }

    .coming-soon {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ff4444;
      margin-bottom: 0.5rem;
      letter-spacing: 5px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2.5rem;
      letter-spacing: 2px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .countdown-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      min-width: 85px;
      transition: 0.3s;
    }

    .countdown-item:hover {
      background: rgba(255, 26, 26, 0.1);
      border-color: #ff1a1a;
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 26, 26, 0.2);
    }

    .countdown-number {
      font-size: 3rem;
      font-weight: 900;
      color: #ff1a1a;
      display: block;
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 0.4rem;
      letter-spacing: 1px;
    }

    .rubika-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 3rem;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffffff;
      text-decoration: none;
      background: #ff1a1a;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 1px;
      box-shadow: 0 5px 25px rgba(255, 26, 26, 0.4);
    }

    .rubika-btn:hover {
      background: #ff4444;
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(255, 26, 26, 0.6);
    }

    .rubika-btn:active {
      transform: scale(0.96);
    }

    .footer-text {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.8rem;
      margin-top: 2rem;
      letter-spacing: 2px;
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 1.5rem;
        margin: 1rem;
        border-radius: 24px;
      }
      .logo {
        font-size: 3.5rem;
      }
      .logo .apt { letter-spacing: 8px; }
      .logo .war { letter-spacing: 12px; }
      .coming-soon { font-size: 2rem; }
      .countdown { gap: 0.7rem; }
      .countdown-item { padding: 1rem 1rem; min-width: 65px; border-radius: 12px; }
      .countdown-number { font-size: 2.2rem; }
      .rubika-btn { padding: 0.9rem 2.2rem; font-size: 1.1rem; }
    }

    @media (max-width: 480px) {
      .logo { font-size: 2.8rem; }
      .logo .apt { letter-spacing: 5px; }
      .logo .war { letter-spacing: 8px; }
      .coming-soon { font-size: 1.6rem; letter-spacing: 2px; }
      .countdown-item { min-width: 55px; padding: 0.8rem 0.7rem; }
      .countdown-number { font-size: 1.8rem; }
      .countdown-label { font-size: 0.7rem; }
      .rubika-btn { padding: 0.8rem 1.8rem; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="main-container">
    <div class="logo">
      <span class="apt">APT</span>
      <span class="war">WAR</span>
    </div>

    <h2 class="coming-soon">به زودی</h2>
    <p class="subtitle">سایت در حال ساخت است</p>

    <div class="countdown" id="countdown">
      <div class="countdown-item">
        <span class="countdown-number" id="days">00</span>
        <span class="countdown-label">روز</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="hours">00</span>
        <span class="countdown-label">ساعت</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="minutes">00</span>
        <span class="countdown-label">دقیقه</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="seconds">00</span>
        <span class="countdown-label">ثانیه</span>
      </div>
    </div>

<a href="https://rubika.ir/APTWAR11" target="_blank" class="rubika-btn">
      ⚡ Go To Rubika
    </a>

    <p class="footer-text">© 2026 APT WAR</p>
  </div>

  <script>
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 21);
    targetDate.setHours(22, 30, 0, 0);

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      document.getElementById('days').textContent = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
      document.getElementById('hours').textContent = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
      document.getElementById('minutes').textContent = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
      document.getElementById('seconds').textContent = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
